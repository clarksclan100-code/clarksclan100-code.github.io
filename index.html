<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF8F3;
    --ink: #2B2B2E;
    --blueprint: #3D5A80;
    --amber: #E0A458;
    --grid: #D8D4C8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background-color: var(--paper);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
  }

  body {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 32px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .sheet {
    position: relative;
    width: 100%;
    max-width: 640px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 56px 48px 40px;
  }

  /* corner crop marks, like a drafting sheet */
  .sheet::before,
  .sheet::after,
  .corner-tl,
  .corner-tr {
    content: "";
    position: absolute;
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--blueprint);
  }
  .sheet::before { top: -8px; left: -8px; border-right: none; border-bottom: none; }
  .sheet::after  { bottom: -8px; right: -8px; border-left: none; border-top: none; }

  .stamp {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--blueprint);
    text-align: right;
    line-height: 1.6;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    line-height: 1.08;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }

  p {
    font-size: 14px;
    line-height: 1.7;
    max-width: 38ch;
    color: #54525a;
  }

  .footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--grid);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: #8a8790;
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--blueprint);
    margin-right: 8px;
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (prefers-reduced-motion: reduce) {
    .dot { animation: none; }
  }
</style>
</head>
<body>
  <main class="sheet">
    <div class="stamp">PAGE&nbsp;1 / 1<br>DRAFT&nbsp;V0.1</div>
    <div class="eyebrow">Status report</div>
    <h1>Building<br>something here.</h1>
    <p>This site is under construction. The foundation just went in — come back soon to see what's standing on it.</p>
    <div class="footer">
      <span><span class="dot"></span>Live, in progress</span>
      <span id="date"></span>
    </div>
  </main>
  <script>
    document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  </script>
</body>
</html>
